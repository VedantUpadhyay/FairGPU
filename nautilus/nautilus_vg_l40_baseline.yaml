apiVersion: batch/v1
kind: Job
metadata:
  name: fairgpu-vg-l40-baseline
  namespace: systems-research-lab
spec:
  completions: 2
  parallelism: 2
  completionMode: Indexed
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-L40
                - NVIDIA-L40S
                - NVIDIA-RTX-A5000
                - NVIDIA-RTX-A4000
      initContainers:
      - name: clone-repo
        image: alpine/git
        command:
        - sh
        - -c
        - |
          set -e
          git clone --recurse-submodules \
            https://github.com/VedantUpadhyay/FairGPU.git \
            /workspace/FairGPU
          cd /workspace/FairGPU
          echo "Repo ready"
          ls faircpu/value_curves.py
          ls vllm/vllm/v1/core/sched/request_queue.py
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
      containers:
      - name: eval
        image: vllm/vllm-openai:latest
        command:
        - bash
        - -lc
        - |
          set -e
          CONDITIONS=(fcfs value_greedy_aging)
          IDX=${JOB_COMPLETION_INDEX:-0}
          CONDITION=${CONDITIONS[$IDX]}
          echo "JOB_COMPLETION_INDEX=${JOB_COMPLETION_INDEX}"
          echo "Condition will be: ${CONDITIONS[$JOB_COMPLETION_INDEX]}"
          echo "=== Pod $IDX: condition=$CONDITION ==="

          cd /workspace/FairGPU

          pip install -e . --quiet
          pip install datasets --quiet

          bash patches/apply_vllm_patch.sh

          export PYTHONPATH=/workspace/FairGPU:$PYTHONPATH

          python3 -c "
          from vllm.v1.core.sched.request_queue import (
              SchedulingPolicy, ValueGreedyRequestQueue)
          print('Scheduler patch verified OK')
          print('VALUE_GREEDY:', SchedulingPolicy.VALUE_GREEDY)
          "

          python3 experiments/vg_eval/run_eval.py \
            --condition $CONDITION \
            --n_requests 1000 \
            --urgency_mode standard \
            --model facebook/opt-1.3b \
            --output_dir /eval_outputs/l40_baseline/$CONDITION/

          echo "=== $CONDITION complete ==="
        env:
        - name: VLLM_WORKER_MULTIPROC_METHOD
          value: "spawn"
        - name: VLLM_USE_V1
          value: "0"
        - name: CUDA_LAUNCH_BLOCKING
          value: "1"
        resources:
          requests:
            cpu: "8"
            memory: "32Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "8"
            memory: "32Gi"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: eval-out
          mountPath: /eval_outputs
      volumes:
      - name: workspace
        emptyDir: {}
      - name: eval-out
        persistentVolumeClaim:
          claimName: fairgpu-eval-out-pvc
